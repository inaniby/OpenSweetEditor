plugins {
    id 'java'
    id 'application'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(22)
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    implementation(project(':sweeteditor'))
    implementation 'com.qiplat:sweetline-ffm:1.1.1'
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

application {
    mainClass = 'com.qiplat.sweeteditor.demo.Main'
    def osName = System.getProperty('os.name').toLowerCase()
    def osArch = System.getProperty('os.arch').toLowerCase()
    def nativeLibSubDir
    if (osName.contains('windows')) {
        nativeLibSubDir = '../../../prebuilt/windows/x64'
    } else if (osName.contains('mac')) {
        if (osArch.contains('aarch64') || osArch.contains('arm64')) {
            nativeLibSubDir = '../../../prebuilt/osx/arm64'
        } else {
            nativeLibSubDir = '../../../prebuilt/osx/x86_64'
        }
    } else if (osName.contains('linux')) {
        nativeLibSubDir = '../../../prebuilt/linux/x86_64'
    } else {
        throw new GradleException("Unsupported OS for Swing demo nativeLibDir: ${System.getProperty('os.name')}")
    }

    def nativeLibDir = projectDir.toPath().resolve(nativeLibSubDir).toAbsolutePath().normalize().toString()
    def demoResDir = projectDir.toPath().resolve('../_res').toAbsolutePath().normalize().toString()

    def expectedLibName
    if (osName.contains('windows')) {
        expectedLibName = 'sweeteditor.dll'
    } else if (osName.contains('mac')) {
        expectedLibName = 'libsweeteditor.dylib'
    } else {
        expectedLibName = 'libsweeteditor.so'
    }

    tasks.named('run') {
        doFirst {
            def expectedLib = new File(nativeLibDir, expectedLibName)
            if (!expectedLib.exists()) {
                throw new GradleException("Native library not found: ${expectedLib}. Run scripts/build-shared.ps1 -Platform windows or the matching build-shared.sh target first.")
            }
        }
    }

    applicationDefaultJvmArgs = [
            '--enable-preview',
            '--enable-native-access=ALL-UNNAMED',
            "-Djava.library.path=${nativeLibDir}",
            "-Dsweeteditor.lib.path=${nativeLibDir}",
            "-Dsweeteditor.demo.res.dir=${demoResDir}"
    ]
}

tasks.withType(JavaCompile).configureEach {
    options.compilerArgs += ['--enable-preview']
    options.encoding = 'UTF-8'
}

test {
    useJUnitPlatform()
    jvmArgs '--enable-preview', '--enable-native-access=ALL-UNNAMED'
}
